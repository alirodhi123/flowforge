services:
  db:
    image: postgres:15
    environment:
      POSTGRES_USER: flowforge
      POSTGRES_PASSWORD: flowforge123
      POSTGRES_DB: flowforge
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U flowforge"]
      interval: 5s
      retries: 5

  backend:
    build: ./backend
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql://flowforge:flowforge123@db:5432/flowforge
      SECRET_KEY: supersecretkey123456789
    depends_on:
      db:
        condition: service_healthy
  
  frontend:
    image: nginx:alpine
    ports:
      - "3000:80"
    volumes:
      - ./frontend:/usr/share/nginx/html

volumes:
  postgres_data: